<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mis Plantas">
  <meta name="theme-color" content="#c8e6c0">
  <title>Mis Plantas 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #e8f0e4; font-family: 'DM Sans', sans-serif; }
    button { font-family: 'DM Sans', sans-serif; }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    input:focus { border-color: #5aab6e !important; box-shadow: 0 0 0 3px rgba(90,171,110,0.15); outline: none; }
    button:active { opacity: 0.82; transform: scale(0.97); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #a8c8a0; border-radius: 4px; }
    #app { min-height: 100vh; background: linear-gradient(160deg, #c8e6c0 0%, #e8f0e4 40%, #d4ebd0 100%); max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
    .header { padding: 52px 20px 20px; background: linear-gradient(180deg, rgba(180,220,170,0.6) 0%, transparent 100%); }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-family: 'Lora', serif; font-size: 30px; color: #1e3a1e; font-weight: 700; line-height: 1.1; }
    .header p { font-size: 14px; color: #5a8a5a; margin-top: 4px; }
    .urgent-text { color: #e05c3a; font-weight: 600; }
    .add-btn { width: 50px; height: 50px; border-radius: 16px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-size: 26px; cursor: pointer; box-shadow: 0 4px 14px rgba(60,138,82,0.35); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .filter-tabs { display: flex; gap: 8px; margin-top: 18px; }
    .filter-tab { padding: 8px 18px; border-radius: 99px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; backdrop-filter: blur(6px); }
    .filter-tab.active { background: #3d8a52; color: #fff; }
    .filter-tab.inactive { background: rgba(255,255,255,0.6); color: #4a7a4a; }
    .plant-list { padding: 0 16px; }
    .plant-card { background: rgba(255,255,255,0.82); backdrop-filter: blur(12px); border-radius: 22px; padding: 18px 18px 16px; margin-bottom: 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
    .badge { position: absolute; top: 0; right: 0; color: #fff; font-size: 10px; font-family: 'Lora', serif; padding: 4px 12px 4px 10px; border-radius: 0 22px 0 12px; font-weight: 600; letter-spacing: 0.5px; }
    .badge-water { background: #e05c3a; }
    .badge-fert { background: #7a5c2e; }
    .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .plant-emoji-box { width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg, #d4edda 0%, #a8d8a0 100%); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
    .plant-name { font-family: 'Lora', serif; font-weight: 700; font-size: 17px; color: #2d4a2d; line-height: 1.2; }
    .plant-loc { font-size: 12px; color: #7a9a7a; margin-top: 2px; }
    .bar-row { margin-bottom: 10px; }
    .bar-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .bar-label { font-size: 12px; color: #5a7a5a; }
    .bar-value { font-size: 12px; }
    .bar-track { width: 100%; background: #e8efe5; border-radius: 99px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
    .leaf-info { font-size: 12px; color: #7a9a7a; margin-bottom: 12px; }
    .action-btns { display: flex; gap: 8px; }
    .btn-water { flex: 1; padding: 9px 0; border-radius: 12px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
    .btn-fert { flex: 1; padding: 9px 0; border-radius: 12px; border: none; background: linear-gradient(135deg, #c8a96e, #9a7a42); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
    .undo-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-undo-water { flex: 1; padding: 7px 0; border-radius: 10px; border: 1.5px solid #5aab6e; background: rgba(90,171,110,0.08); color: #3d8a52; font-weight: 600; font-size: 12px; cursor: pointer; }
    .btn-undo-fert { flex: 1; padding: 7px 0; border-radius: 10px; border: 1.5px solid #c8a96e; background: rgba(200,169,110,0.08); color: #9a7a42; font-weight: 600; font-size: 12px; cursor: pointer; }
    .empty-state { text-align: center; padding: 60px 20px; font-family: 'Lora', serif; color: #7a9a7a; }
    .empty-state .emoji { font-size: 52px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: #9ab89a; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(20,40,20,0.45); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal-sheet { background: #f5f9f3; border-radius: 28px 28px 0 0; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; padding: 28px 20px 40px; animation: slideUp 0.3s cubic-bezier(.4,0,.2,1); }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .modal-title { font-family: 'Lora', serif; color: #2d4a2d; font-size: 22px; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; }
    .detail-emoji-box { width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, #d4edda 0%, #a8d8a0 100%); display: flex; align-items: center; justify-content: center; font-size: 34px; }
    .notes-box { background: #eff7ec; border-radius: 14px; padding: 12px 16px; margin-bottom: 18px; font-size: 14px; color: #4a6a4a; }
    .detail-row { background: #fff; border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(60,90,50,0.07); }
    .detail-row-top { display: flex; justify-content: space-between; align-items: center; }
    .detail-row-label { font-weight: 600; font-size: 14px; color: #2d4a2d; }
    .detail-row-sub { font-size: 13px; color: #7a9a7a; margin-top: 2px; }
    .btn-action { padding: 8px 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-weight: 600; font-size: 12px; cursor: pointer; }
    .btn-undo-detail-water { margin-top: 10px; width: 100%; padding: 7px 0; border-radius: 10px; border: 1.5px solid #5aab6e; background: rgba(90,171,110,0.08); color: #3d8a52; font-weight: 600; font-size: 12px; cursor: pointer; }
    .btn-undo-detail-fert { margin-top: 10px; width: 100%; padding: 7px 0; border-radius: 10px; border: 1.5px solid #c8a96e; background: rgba(200,169,110,0.08); color: #9a7a42; font-weight: 600; font-size: 12px; cursor: pointer; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: #5a7a5a; display: block; margin-bottom: 4px; }
    .form-input { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1.5px solid #c8dec8; font-size: 15px; background: #fff; box-sizing: border-box; }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .emoji-btn { width: 42px; height: 42px; border-radius: 12px; font-size: 22px; cursor: pointer; border: 2px solid transparent; }
    .emoji-btn.selected { border-color: #5aab6e; background: #d4edda; }
    .emoji-btn.unselected { background: #f0f5ee; }
    .btn-save { width: 100%; padding: 16px; border-radius: 16px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; }
    .btn-save:disabled { background: #c8d8c0; cursor: not-allowed; }
    .btn-delete { flex: 1; padding: 14px; border-radius: 14px; border: none; background: #fde8e4; color: #c0392b; font-weight: 700; font-size: 15px; cursor: pointer; }
    .edit-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-edit { background: #e8f5e2; border: none; border-radius: 10px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY = 'mis-plantas-v1';
const PLANT_EMOJIS = ['🌿','🌱','🌵','🪴','🌺','🌸','🌻','🍃','🌾','🎋','🌳','🌴'];
const defaultPlants = [
  { id: 1, name: 'Monstera', emoji: '🌿', location: 'Salón', wateringInterval: 7, fertilizingInterval: 30,
    lastWatered: new Date(Date.now() - 5*86400000).toISOString(), lastFertilized: new Date(Date.now() - 20*86400000).toISOString(),
    lastNewLeaf: new Date(Date.now() - 14*86400000).toISOString(), notes: 'Le gusta la luz indirecta' },
  { id: 2, name: 'Cactus Erizo', emoji: '🌵', location: 'Ventana', wateringInterval: 14, fertilizingInterval: 60,
    lastWatered: new Date(Date.now() - 3*86400000).toISOString(), lastFertilized: new Date(Date.now() - 55*86400000).toISOString(),
    lastNewLeaf: null, notes: '' },
];
let plants = [];
try { const r = localStorage.getItem(STORAGE_KEY); plants = r ? JSON.parse(r) : defaultPlants; }
catch { plants = defaultPlants; }
let filter = 'all';
let modal = null;
let undoQueue = [];
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(plants)); } catch {} }
function daysSince(d) { if (!d) return null; return Math.floor((Date.now() - new Date(d).getTime()) / 86400000); }
function barColor(pct) { if (pct >= 100) return '#e05c3a'; if (pct >= 75) return '#e0a23a'; return '#5aab6e'; }
function daysLabel(days, interval) { const d = days === null ? 'nunca' : days === 0 ? 'hoy' : `hace ${days}d`; return `${d} / cada ${interval}d`; }
function pushUndo(id, field, prevValue) {
  const existing = undoQueue.find(u => u.id === id && u.field === field);
  if (existing) clearTimeout(existing.timer);
  undoQueue = undoQueue.filter(u => !(u.id === id && u.field === field));
  const timer = setTimeout(() => { undoQueue = undoQueue.filter(u => !(u.id === id && u.field === field)); render(); }, 5000);
  undoQueue.push({ id, field, prevValue, timer });
}
function doUndo(id, field) {
  const entry = undoQueue.find(u => u.id === id && u.field === field);
  if (!entry) return;
  clearTimeout(entry.timer);
  plants = plants.map(p => p.id === id ? { ...p, [field]: entry.prevValue } : p);
  undoQueue = undoQueue.filter(u => !(u.id === id && u.field === field));
  if (modal && modal.plant && modal.plant.id === id) modal.plant = plants.find(p => p.id === id);
  save(); render();
}
function waterPlant(id) {
  const prev = plants.find(p => p.id === id)?.lastWatered ?? null;
  const now = new Date().toISOString();
  plants = plants.map(p => p.id === id ? { ...p, lastWatered: now } : p);
  if (modal?.plant?.id === id) modal.plant = plants.find(p => p.id === id);
  pushUndo(id, 'lastWatered', prev); save(); render();
}
function fertilizePlant(id) {
  const prev = plants.find(p => p.id === id)?.lastFertilized ?? null;
  const now = new Date().toISOString();
  plants = plants.map(p => p.id === id ? { ...p, lastFertilized: now } : p);
  if (modal?.plant?.id === id) modal.plant = plants.find(p => p.id === id);
  pushUndo(id, 'lastFertilized', prev); save(); render();
}
function recordLeaf(id) {
  plants = plants.map(p => p.id === id ? { ...p, lastNewLeaf: new Date().toISOString() } : p);
  if (modal?.plant?.id === id) modal.plant = plants.find(p => p.id === id);
  save(); render();
}
function deletePlant(id) { plants = plants.filter(p => p.id !== id); modal = null; save(); render(); }
function savePlant(data) {
  if (data.id) { plants = plants.map(p => p.id === data.id ? { ...p, ...data } : p); }
  else { plants = [...plants, { ...data, id: Date.now(), lastWatered: null, lastFertilized: null, lastNewLeaf: null }]; }
  modal = null; save(); render();
}
function makeBar(days, interval) {
  const pct = Math.min(((days ?? 0) / interval) * 100, 100);
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>`;
}
function makeUndoRow(id) {
  const hasWater = undoQueue.some(u => u.id === id && u.field === 'lastWatered');
  const hasFert  = undoQueue.some(u => u.id === id && u.field === 'lastFertilized');
  if (!hasWater && !hasFert) return '';
  return `<div class="undo-row">
    ${hasWater ? `<button class="btn-undo-water" onclick="event.stopPropagation();doUndo(${id},'lastWatered')">↩ Deshacer riego</button>` : ''}
    ${hasFert  ? `<button class="btn-undo-fert"  onclick="event.stopPropagation();doUndo(${id},'lastFertilized')">↩ Deshacer abono</button>` : ''}
  </div>`;
}
function renderCard(p) {
  const wd = daysSince(p.lastWatered); const fd = daysSince(p.lastFertilized); const ld = daysSince(p.lastNewLeaf);
  const wUrgent = wd >= p.wateringInterval; const fUrgent = fd !== null && fd >= p.fertilizingInterval;
  const shadow = wUrgent ? '0 2px 18px rgba(224,92,58,0.18)' : '0 2px 14px rgba(60,90,50,0.09)';
  const border  = wUrgent ? '1.5px solid rgba(224,92,58,0.3)' : '1.5px solid rgba(180,210,170,0.4)';
  return `<div class="plant-card" style="box-shadow:${shadow};border:${border}" onclick="openDetail(${p.id})">
    ${wUrgent ? `<div class="badge badge-water">💧 ¡Necesita agua!</div>` : ''}
    ${fUrgent && !wUrgent ? `<div class="badge badge-fert">🌱 Fertilizar</div>` : ''}
    <div class="card-header">
      <div class="plant-emoji-box">${p.emoji}</div>
      <div style="flex:1"><div class="plant-name">${p.name}</div><div class="plant-loc">📍 ${p.location}</div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label-row"><span class="bar-label">💧 Riego</span><span class="bar-value" style="color:${wUrgent?'#e05c3a':'#5a7a5a'};font-weight:${wUrgent?700:400}">${daysLabel(wd,p.wateringInterval)}</span></div>
      ${makeBar(wd,p.wateringInterval)}
    </div>
    <div class="bar-row" style="margin-bottom:12px">
      <div class="bar-label-row"><span class="bar-label">🌱 Fertilizante</span><span class="bar-value" style="color:${fUrgent?'#e0a23a':'#5a7a5a'};font-weight:${fUrgent?700:400}">${daysLabel(fd,p.fertilizingInterval)}</span></div>
      ${makeBar(fd,p.fertilizingInterval)}
    </div>
    ${ld !== null ? `<div class="leaf-info">🍃 Última hoja nueva: hace ${ld===0?'hoy':ld+' días'}</div>` : ''}
    <div class="action-btns">
      <button class="btn-water" onclick="event.stopPropagation();waterPlant(${p.id})">💧 Regar</button>
      <button class="btn-fert"  onclick="event.stopPropagation();fertilizePlant(${p.id})">🌱 Fertilizar</button>
    </div>
    ${makeUndoRow(p.id)}
  </div>`;
}
function renderDetail(p) {
  const wd = daysSince(p.lastWatered); const fd = daysSince(p.lastFertilized); const ld = daysSince(p.lastNewLeaf);
  const hasUndoWater = undoQueue.some(u => u.id === p.id && u.field === 'lastWatered');
  const hasUndoFert  = undoQueue.some(u => u.id === p.id && u.field === 'lastFertilized');
  function dLabel(days) { return days === null ? 'Sin registrar' : days === 0 ? 'Hoy' : `Hace ${days} día${days!==1?'s':''}`; }
  return `<div class="modal-header">
    <div style="display:flex;gap:14px;align-items:center">
      <div class="detail-emoji-box">${p.emoji}</div>
      <div><div class="modal-title">${p.name}</div><div style="font-size:13px;color:#7a9a7a">📍 ${p.location}</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-edit" onclick="openEdit(${p.id})">✏️ Editar</button>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
  </div>
  ${p.notes ? `<div class="notes-box">📝 ${p.notes}</div>` : ''}
  <div class="detail-row">
    <div class="detail-row-top"><div><div class="detail-row-label">💧 Último riego</div><div class="detail-row-sub">${dLabel(wd)} · cada ${p.wateringInterval} días</div></div>
    <button class="btn-action" onclick="waterPlant(${p.id})">Regar ahora</button></div>
    ${makeBar(wd,p.wateringInterval)}
    ${hasUndoWater ? `<button class="btn-undo-detail-water" onclick="doUndo(${p.id},'lastWatered')">↩ Deshacer</button>` : ''}
  </div>
  <div class="detail-row">
    <div class="detail-row-top"><div><div class="detail-row-label">🌱 Último abono</div><div class="detail-row-sub">${dLabel(fd)} · cada ${p.fertilizingInterval} días</div></div>
    <button class="btn-action" onclick="fertilizePlant(${p.id})">Fertilizar ahora</button></div>
    ${makeBar(fd,p.fertilizingInterval)}
    ${hasUndoFert ? `<button class="btn-undo-detail-fert" onclick="doUndo(${p.id},'lastFertilized')">↩ Deshacer</button>` : ''}
  </div>
  <div class="detail-row">
    <div class="detail-row-top"><div><div class="detail-row-label">🍃 Última hoja nueva</div><div class="detail-row-sub">${dLabel(ld)}</div></div>
    <button class="btn-action" onclick="recordLeaf(${p.id})">Nueva hoja hoy</button></div>
  </div>`;
}
function renderForm(p) {
  const isEdit = !!p;
  const em = p?.emoji ?? '🌿';
  return `<div class="modal-header">
    <div class="modal-title">${isEdit ? 'Editar planta' : 'Nueva planta 🌱'}</div>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="form-group"><label class="form-label">Nombre${!isEdit?' *':''}</label><input id="f-name" class="form-input" type="text" value="${p?.name??''}" oninput="checkForm()"></div>
  <div class="form-group"><label class="form-label">Ubicación</label><input id="f-loc" class="form-input" type="text" value="${p?.location??''}"></div>
  <div class="form-group"><label class="form-label">Notas</label><input id="f-notes" class="form-input" type="text" value="${p?.notes??''}"></div>
  <div class="form-group"><label class="form-label">Regar cada (días)</label><input id="f-wi" class="form-input" type="number" value="${p?.wateringInterval??7}"></div>
  <div class="form-group"><label class="form-label">Fertilizar cada (días)</label><input id="f-fi" class="form-input" type="number" value="${p?.fertilizingInterval??30}"></div>
  <div class="form-group"><label class="form-label">Emoji</label>
    <div class="emoji-grid">${PLANT_EMOJIS.map(e=>`<button class="emoji-btn ${e===em?'selected':'unselected'}" onclick="selectEmoji('${e}',this)">${e}</button>`).join('')}</div>
  </div>
  <input type="hidden" id="f-emoji" value="${em}">
  <input type="hidden" id="f-id" value="${p?.id??''}">
  ${isEdit ? `<div class="edit-actions"><button id="save-btn" class="btn-save" style="flex:2" onclick="submitForm()">Guardar</button><button class="btn-delete" onclick="deletePlant(${p.id})">Eliminar</button></div>`
           : `<button id="save-btn" class="btn-save" ${!(p?.name)&&''?'disabled':''} onclick="submitForm()">Añadir planta</button>`}`;
}
function openDetail(id) { modal = { type: 'detail', plant: plants.find(p => p.id === id) }; render(); }
function openEdit(id)   { modal = { type: 'form',   plant: plants.find(p => p.id === id) }; render(); }
function openAdd()      { modal = { type: 'form',   plant: null }; render(); }
function closeModal()   { modal = null; render(); }
function selectEmoji(e, btn) {
  document.querySelectorAll('.emoji-btn').forEach(b => b.className = 'emoji-btn unselected');
  btn.className = 'emoji-btn selected';
  document.getElementById('f-emoji').value = e;
}
function checkForm() { const btn = document.getElementById('save-btn'); if (btn) btn.disabled = !document.getElementById('f-name').value.trim(); }
function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  savePlant({ id: +document.getElementById('f-id').value||null, name, location: document.getElementById('f-loc').value.trim(),
    notes: document.getElementById('f-notes').value.trim(), wateringInterval: +document.getElementById('f-wi').value||7,
    fertilizingInterval: +document.getElementById('f-fi').value||30, emoji: document.getElementById('f-emoji').value });
}
function setFilter(f) { filter = f; render(); }
function handleOverlayClick(e) { if (e.target.classList.contains('modal-overlay')) closeModal(); }
function render() {
  const urgentCount = plants.filter(p => daysSince(p.lastWatered) >= p.wateringInterval).length;
  const filtered = filter === 'urgent' ? plants.filter(p => daysSince(p.lastWatered) >= p.wateringInterval || (daysSince(p.lastFertilized)??0) >= p.fertilizingInterval) : plants;
  const listHTML = filtered.length === 0
    ? `<div class="empty-state"><div class="emoji">🌱</div><h2>${filter==='urgent'?'¡Todo al día!':'Sin plantas aún'}</h2><p>${filter==='urgent'?'Ninguna planta necesita atención':'Toca + para añadir tu primera planta'}</p></div>`
    : filtered.map(renderCard).join('');
  document.getElementById('app').innerHTML = `
  <div style="min-height:100vh;background:linear-gradient(160deg,#c8e6c0 0%,#e8f0e4 40%,#d4ebd0 100%);max-width:480px;margin:0 auto;padding-bottom:100px">
    <div class="header">
      <div class="header-top">
        <div><h1>Mis Plantas 🌿</h1>
          <p>${plants.length} planta${plants.length!==1?'s':''}${urgentCount>0?`<span class="urgent-text"> · ${urgentCount} necesita${urgentCount!==1?'n':''} agua</span>`:''}</p>
        </div>
        <button class="add-btn" onclick="openAdd()">+</button>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab ${filter==='all'?'active':'inactive'}" onclick="setFilter('all')">Todas</button>
        <button class="filter-tab ${filter==='urgent'?'active':'inactive'}" onclick="setFilter('urgent')">⚠️ Urgentes</button>
      </div>
    </div>
    <div class="plant-list">${listHTML}</div>
  </div>
  ${modal?`<div class="modal-overlay" onclick="handleOverlayClick(event)"><div class="modal-sheet" onclick="event.stopPropagation()">${modal.type==='detail'?renderDetail(modal.plant):renderForm(modal.plant)}</div></div>`:''}`;
}
render();
</script>
</body>
</html>
