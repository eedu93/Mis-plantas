<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mis Plantas">
  <meta name="theme-color" content="#c8e6c0">
  <title>Mis Plantas 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #e8f0e4; font-family: 'DM Sans', sans-serif; }
    button { font-family: 'DM Sans', sans-serif; }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    input:focus { border-color: #5aab6e !important; box-shadow: 0 0 0 3px rgba(90,171,110,0.15); outline: none; }
    button:active { opacity: 0.82; transform: scale(0.97); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #a8c8a0; border-radius: 4px; }
    #app { min-height: 100vh; background: linear-gradient(160deg, #c8e6c0 0%, #e8f0e4 40%, #d4ebd0 100%); max-width: 520px; margin: 0 auto; padding-bottom: 80px; }
    .header { padding: 48px 14px 12px; background: linear-gradient(180deg, rgba(180,220,170,0.6) 0%, transparent 100%); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header h1 { font-family: 'Lora', serif; font-size: 24px; color: #1e3a1e; font-weight: 700; line-height: 1.1; }
    .header-sub { font-size: 12px; color: #5a8a5a; margin-top: 2px; }
    .urgent-text { color: #e05c3a; font-weight: 600; }
    .add-btn { width: 42px; height: 42px; border-radius: 13px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-size: 22px; cursor: pointer; box-shadow: 0 4px 14px rgba(60,138,82,0.35); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-input { width: 100%; padding: 8px 14px 8px 34px; border-radius: 11px; border: 1.5px solid rgba(180,210,170,0.6); background: rgba(255,255,255,0.75); font-size: 13px; font-family: 'DM Sans', sans-serif; color: #2d4a2d; }
    .search-input::placeholder { color: #9ab89a; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
    .search-clear { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 15px; color: #9ab89a; cursor: pointer; padding: 0; }
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab { padding: 5px 13px; border-radius: 99px; border: none; font-weight: 600; font-size: 11px; cursor: pointer; }
    .filter-tab.active { background: #3d8a52; color: #fff; }
    .filter-tab.inactive { background: rgba(255,255,255,0.6); color: #4a7a4a; }
    .plant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 10px 0; }
    .plant-card { background: rgba(255,255,255,0.88); backdrop-filter: blur(12px); border-radius: 14px; padding: 9px 10px 8px; cursor: pointer; position: relative; overflow: hidden; }
    .card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
    .plant-emoji-box { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, #d4edda 0%, #a8d8a0 100%); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .plant-name { font-family: 'Lora', serif; font-weight: 700; font-size: 12px; color: #2d4a2d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .plant-loc { font-size: 10px; color: #9ab89a; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .urgent-dot { width: 7px; height: 7px; border-radius: 99px; background: #e05c3a; flex-shrink: 0; }
    .card-bars { display: flex; flex-direction: column; gap: 3px; margin-bottom: 7px; }
    .mini-bar-row { display: flex; align-items: center; gap: 5px; }
    .mini-bar-label { font-size: 9px; width: 9px; flex-shrink: 0; }
    .mini-bar-track { flex: 1; background: #e8efe5; border-radius: 99px; height: 4px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
    .mini-bar-days { font-size: 9px; width: 24px; text-align: right; flex-shrink: 0; }
    .card-actions { display: flex; gap: 4px; }
    .btn-w { flex: 1; padding: 5px 0; border-radius: 7px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-weight: 600; font-size: 10px; cursor: pointer; }
    .btn-f { flex: 1; padding: 5px 0; border-radius: 7px; border: none; background: linear-gradient(135deg, #c8a96e, #9a7a42); color: #fff; font-weight: 600; font-size: 10px; cursor: pointer; }
    .undo-row { display: flex; gap: 4px; margin-top: 4px; }
    .btn-undo-w { flex: 1; padding: 4px 0; border-radius: 6px; border: 1.5px solid #5aab6e; background: rgba(90,171,110,0.08); color: #3d8a52; font-weight: 600; font-size: 9px; cursor: pointer; }
    .btn-undo-f { flex: 1; padding: 4px 0; border-radius: 6px; border: 1.5px solid #c8a96e; background: rgba(200,169,110,0.08); color: #9a7a42; font-weight: 600; font-size: 9px; cursor: pointer; }
    .empty-state { text-align: center; padding: 60px 20px; font-family: 'Lora', serif; color: #7a9a7a; grid-column: 1/-1; }
    .empty-state .emoji { font-size: 48px; margin-bottom: 14px; }
    .empty-state h2 { font-size: 17px; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: #9ab89a; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(20,40,20,0.45); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal-sheet { background: #f5f9f3; border-radius: 28px 28px 0 0; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; padding: 26px 18px 40px; animation: slideUp 0.3s cubic-bezier(.4,0,.2,1); }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    .modal-title { font-family: 'Lora', serif; color: #2d4a2d; font-size: 21px; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; }
    .detail-emoji-box { width: 58px; height: 58px; border-radius: 17px; background: linear-gradient(135deg, #d4edda 0%, #a8d8a0 100%); display: flex; align-items: center; justify-content: center; font-size: 30px; }
    .notes-box { background: #eff7ec; border-radius: 13px; padding: 11px 14px; margin-bottom: 16px; font-size: 13px; color: #4a6a4a; }
    .detail-row { background: #fff; border-radius: 14px; padding: 13px 15px; margin-bottom: 10px; box-shadow: 0 1px 8px rgba(60,90,50,0.07); }
    .detail-row-top { display: flex; justify-content: space-between; align-items: center; }
    .detail-row-label { font-weight: 600; font-size: 13px; color: #2d4a2d; }
    .detail-row-sub { font-size: 12px; color: #7a9a7a; margin-top: 2px; }
    .btn-action { padding: 7px 12px; border-radius: 9px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-weight: 600; font-size: 11px; cursor: pointer; }
    .btn-undo-detail-w { margin-top: 9px; width: 100%; padding: 6px 0; border-radius: 9px; border: 1.5px solid #5aab6e; background: rgba(90,171,110,0.08); color: #3d8a52; font-weight: 600; font-size: 12px; cursor: pointer; }
    .btn-undo-detail-f { margin-top: 9px; width: 100%; padding: 6px 0; border-radius: 9px; border: 1.5px solid #c8a96e; background: rgba(200,169,110,0.08); color: #9a7a42; font-weight: 600; font-size: 12px; cursor: pointer; }
    .bar-track { width: 100%; background: #e8efe5; border-radius: 99px; height: 6px; overflow: hidden; margin-top: 8px; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s; }
    .form-group { margin-bottom: 13px; }
    .form-label { font-size: 13px; color: #5a7a5a; display: block; margin-bottom: 4px; }
    .form-input { width: 100%; padding: 10px 13px; border-radius: 11px; border: 1.5px solid #c8dec8; font-size: 14px; background: #fff; box-sizing: border-box; }
    .form-hint { font-size: 11px; color: #9ab89a; margin-top: 3px; }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .emoji-btn { width: 40px; height: 40px; border-radius: 11px; font-size: 21px; cursor: pointer; border: 2px solid transparent; }
    .emoji-btn.selected { border-color: #5aab6e; background: #d4edda; }
    .emoji-btn.unselected { background: #f0f5ee; }
    .btn-save { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, #5aab6e, #3d8a52); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; }
    .btn-save:disabled { background: #c8d8c0; cursor: not-allowed; }
    .btn-delete { flex: 1; padding: 13px; border-radius: 13px; border: none; background: #fde8e4; color: #c0392b; font-weight: 700; font-size: 14px; cursor: pointer; }
    .edit-actions { display: flex; gap: 10px; margin-top: 18px; }
    .btn-edit { background: #e8f5e2; border: none; border-radius: 9px; padding: 7px 11px; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY = 'mis-plantas-v1';
const PLANT_EMOJIS = ['🌿','🌱','🌵','🪴','🌺','🌸','🌻','🍃','🌾','🎋','🌳','🌴'];
const defaultPlants = [
  { id: 1, name: 'Monstera', emoji: '🌿', location: 'Salón', wateringInterval: 7, fertilizingInterval: 30,
    lastWatered: new Date(Date.now()-5*86400000).toISOString(), lastFertilized: new Date(Date.now()-20*86400000).toISOString(),
    lastNewLeaf: new Date(Date.now()-14*86400000).toISOString(), notes: 'Le gusta la luz indirecta' },
  { id: 2, name: 'Cactus Erizo', emoji: '🌵', location: 'Ventana', wateringInterval: 14, fertilizingInterval: 60,
    lastWatered: new Date(Date.now()-3*86400000).toISOString(), lastFertilized: new Date(Date.now()-55*86400000).toISOString(),
    lastNewLeaf: null, notes: '' },
];
let plants = [];
try { const r = localStorage.getItem(STORAGE_KEY); plants = r ? JSON.parse(r) : defaultPlants; } catch { plants = defaultPlants; }
let filter = 'all', search = '', modal = null, undoQueue = [];
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(plants)); } catch {} }
function daysSince(d) { if (!d) return null; return Math.floor((Date.now()-new Date(d).getTime())/86400000); }
function daysAgoToISO(n) { return n===''||n===null||isNaN(+n)||String(n).trim()==='' ? null : new Date(Date.now()-(+n)*86400000).toISOString(); }
function barColor(pct) { return pct>=100?'#e05c3a':pct>=75?'#e0a23a':'#5aab6e'; }
function pushUndo(id,field,prev){const ex=undoQueue.find(u=>u.id===id&&u.field===field);if(ex)clearTimeout(ex.timer);undoQueue=undoQueue.filter(u=>!(u.id===id&&u.field===field));const timer=setTimeout(()=>{undoQueue=undoQueue.filter(u=>!(u.id===id&&u.field===field));render();},5000);undoQueue.push({id,field,prevValue:prev,timer});}
function doUndo(id,field){const e=undoQueue.find(u=>u.id===id&&u.field===field);if(!e)return;clearTimeout(e.timer);plants=plants.map(p=>p.id===id?{...p,[field]:e.prevValue}:p);undoQueue=undoQueue.filter(u=>!(u.id===id&&u.field===field));if(modal?.plant?.id===id)modal.plant=plants.find(p=>p.id===id);save();render();}
function waterPlant(id){const prev=plants.find(p=>p.id===id)?.lastWatered??null,now=new Date().toISOString();plants=plants.map(p=>p.id===id?{...p,lastWatered:now}:p);if(modal?.plant?.id===id)modal.plant=plants.find(p=>p.id===id);pushUndo(id,'lastWatered',prev);save();render();}
function fertilizePlant(id){const prev=plants.find(p=>p.id===id)?.lastFertilized??null,now=new Date().toISOString();plants=plants.map(p=>p.id===id?{...p,lastFertilized:now}:p);if(modal?.plant?.id===id)modal.plant=plants.find(p=>p.id===id);pushUndo(id,'lastFertilized',prev);save();render();}
function recordLeaf(id){plants=plants.map(p=>p.id===id?{...p,lastNewLeaf:new Date().toISOString()}:p);if(modal?.plant?.id===id)modal.plant=plants.find(p=>p.id===id);save();render();}
function deletePlant(id){plants=plants.filter(p=>p.id!==id);modal=null;save();render();}
function savePlant(data){if(data.id)plants=plants.map(p=>p.id===data.id?{...p,...data}:p);else plants=[...plants,{...data,id:Date.now()}];modal=null;save();render();}
function makeFullBar(days,interval){const pct=Math.min(((days??0)/interval)*100,100);return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>`;}
function makeMiniBar(days,interval,icon){const pct=Math.min(((days??0)/interval)*100,100),d=days===null?'—':days===0?'hoy':`${days}d`;return `<div class="mini-bar-row"><span class="mini-bar-label">${icon}</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div><span class="mini-bar-days" style="color:${barColor(pct)}">${d}</span></div>`;}
function makeUndoRow(id){const hw=undoQueue.some(u=>u.id===id&&u.field==='lastWatered'),hf=undoQueue.some(u=>u.id===id&&u.field==='lastFertilized');if(!hw&&!hf)return '';return `<div class="undo-row">${hw?`<button class="btn-undo-w" onclick="event.stopPropagation();doUndo(${id},'lastWatered')">↩ Riego</button>`:''}${hf?`<button class="btn-undo-f" onclick="event.stopPropagation();doUndo(${id},'lastFertilized')">↩ Abono</button>`:''}</div>`;}
function renderCard(p){const wd=daysSince(p.lastWatered),fd=daysSince(p.lastFertilized),wU=wd>=p.wateringInterval,fU=fd!==null&&fd>=p.fertilizingInterval,urgent=wU||fU,shadow=urgent?'0 2px 10px rgba(224,92,58,0.18)':'0 1px 6px rgba(60,90,50,0.08)',border=urgent?'1.5px solid rgba(224,92,58,0.28)':'1.5px solid rgba(180,210,170,0.35)';return `<div class="plant-card" style="box-shadow:${shadow};border:${border}" onclick="openDetail(${p.id})"><div class="card-top"><div class="plant-emoji-box">${p.emoji}</div><div class="card-info"><div class="plant-name">${p.name}</div><div class="plant-loc">📍 ${p.location}</div></div>${urgent?'<div class="urgent-dot"></div>':''}</div><div class="card-bars">${makeMiniBar(wd,p.wateringInterval,'💧')}${makeMiniBar(fd,p.fertilizingInterval,'🌱')}</div><div class="card-actions"><button class="btn-w" onclick="event.stopPropagation();waterPlant(${p.id})">💧</button><button class="btn-f" onclick="event.stopPropagation();fertilizePlant(${p.id})">🌱</button></div>${makeUndoRow(p.id)}</div>`;}
function renderDetail(p){const wd=daysSince(p.lastWatered),fd=daysSince(p.lastFertilized),ld=daysSince(p.lastNewLeaf),hw=undoQueue.some(u=>u.id===p.id&&u.field==='lastWatered'),hf=undoQueue.some(u=>u.id===p.id&&u.field==='lastFertilized');function dLabel(d){return d===null?'Sin registrar':d===0?'Hoy':`Hace ${d} día${d!==1?'s':''}`;}return `<div class="modal-header"><div style="display:flex;gap:11px;align-items:center"><div class="detail-emoji-box">${p.emoji}</div><div><div class="modal-title">${p.name}</div><div style="font-size:12px;color:#7a9a7a">📍 ${p.location}</div></div></div><div style="display:flex;gap:7px"><button class="btn-edit" onclick="openEdit(${p.id})">✏️</button><button class="close-btn" onclick="closeModal()">✕</button></div></div>${p.notes?`<div class="notes-box">📝 ${p.notes}</div>`:''}<div class="detail-row"><div class="detail-row-top"><div><div class="detail-row-label">💧 Último riego</div><div class="detail-row-sub">${dLabel(wd)} · cada ${p.wateringInterval} días</div></div><button class="btn-action" onclick="waterPlant(${p.id})">Regar ahora</button></div>${makeFullBar(wd,p.wateringInterval)}${hw?`<button class="btn-undo-detail-w" onclick="doUndo(${p.id},'lastWatered')">↩ Deshacer</button>`:''}</div><div class="detail-row"><div class="detail-row-top"><div><div class="detail-row-label">🌱 Último abono</div><div class="detail-row-sub">${dLabel(fd)} · cada ${p.fertilizingInterval} días</div></div><button class="btn-action" onclick="fertilizePlant(${p.id})">Fertilizar ahora</button></div>${makeFullBar(fd,p.fertilizingInterval)}${hf?`<button class="btn-undo-detail-f" onclick="doUndo(${p.id},'lastFertilized')">↩ Deshacer</button>`:''}</div><div class="detail-row"><div class="detail-row-top"><div><div class="detail-row-label">🍃 Última hoja nueva</div><div class="detail-row-sub">${dLabel(ld)}</div></div><button class="btn-action" onclick="recordLeaf(${p.id})">Nueva hoja hoy</button></div></div>`;}
function renderForm(p){const isEdit=!!p,em=p?.emoji??'🌿',wd=p?(daysSince(p.lastWatered)??''):'',fd=p?(daysSince(p.lastFertilized)??''):'',ld=p?(daysSince(p.lastNewLeaf)??''):'';return `<div class="modal-header"><div class="modal-title">${isEdit?'Editar planta':'Nueva planta 🌱'}</div><button class="close-btn" onclick="closeModal()">✕</button></div><div class="form-group"><label class="form-label">Nombre${!isEdit?' *':''}</label><input id="f-name" class="form-input" type="text" value="${p?.name??''}" oninput="checkForm()"></div><div class="form-group"><label class="form-label">Ubicación</label><input id="f-loc" class="form-input" type="text" value="${p?.location??''}"></div><div class="form-group"><label class="form-label">Notas</label><input id="f-notes" class="form-input" type="text" value="${p?.notes??''}"></div><div class="form-group"><label class="form-label">Regar cada (días)</label><input id="f-wi" class="form-input" type="number" value="${p?.wateringInterval??7}"></div><div class="form-group"><label class="form-label">Fertilizar cada (días)</label><input id="f-fi" class="form-input" type="number" value="${p?.fertilizingInterval??30}"></div><div class="form-group"><label class="form-label">💧 ¿Hace cuántos días la regaste?</label><input id="f-wd" class="form-input" type="number" min="0" placeholder="Ej: 3 (vacío si no sabes)" value="${wd}"><div class="form-hint">Déjalo vacío si no lo recuerdas</div></div><div class="form-group"><label class="form-label">🌱 ¿Hace cuántos días la fertilizaste?</label><input id="f-fd" class="form-input" type="number" min="0" placeholder="Ej: 15 (vacío si no sabes)" value="${fd}"><div class="form-hint">Déjalo vacío si no lo recuerdas</div></div><div class="form-group"><label class="form-label">🍃 ¿Hace cuántos días salió la última hoja?</label><input id="f-ld" class="form-input" type="number" min="0" placeholder="Opcional" value="${ld}"></div><div class="form-group"><label class="form-label">Emoji</label><div class="emoji-grid">${PLANT_EMOJIS.map(e=>`<button class="emoji-btn ${e===em?'selected':'unselected'}" onclick="selectEmoji('${e}',this)">${e}</button>`).join('')}</div></div><input type="hidden" id="f-emoji" value="${em}"><input type="hidden" id="f-id" value="${p?.id??''}">${isEdit?`<div class="edit-actions"><button id="save-btn" class="btn-save" style="flex:2" onclick="submitForm()">Guardar</button><button class="btn-delete" onclick="deletePlant(${p.id})">Eliminar</button></div>`:`<button id="save-btn" class="btn-save" disabled onclick="submitForm()">Añadir planta</button>`}`;}
function openDetail(id){modal={type:'detail',plant:plants.find(p=>p.id===id)};render();}
function openEdit(id){modal={type:'form',plant:plants.find(p=>p.id===id)};render();}
function openAdd(){modal={type:'form',plant:null};render();}
function closeModal(){modal=null;render();}
function setFilter(f){filter=f;render();}
function setSearch(v){search=v;render();}
function clearSearch(){search='';render();}
function selectEmoji(e,btn){document.querySelectorAll('.emoji-btn').forEach(b=>b.className='emoji-btn unselected');btn.className='emoji-btn selected';document.getElementById('f-emoji').value=e;}
function checkForm(){const btn=document.getElementById('save-btn');if(btn)btn.disabled=!document.getElementById('f-name').value.trim();}
function submitForm(){const name=document.getElementById('f-name').value.trim();if(!name)return;const wdVal=document.getElementById('f-wd').value,fdVal=document.getElementById('f-fd').value,ldVal=document.getElementById('f-ld').value;savePlant({id:+document.getElementById('f-id').value||null,name,location:document.getElementById('f-loc').value.trim(),notes:document.getElementById('f-notes').value.trim(),wateringInterval:+document.getElementById('f-wi').value||7,fertilizingInterval:+document.getElementById('f-fi').value||30,emoji:document.getElementById('f-emoji').value,lastWatered:daysAgoToISO(wdVal),lastFertilized:daysAgoToISO(fdVal),lastNewLeaf:daysAgoToISO(ldVal)});}
function handleOverlayClick(e){if(e.target.classList.contains('modal-overlay'))closeModal();}
function render(){const urgentCount=plants.filter(p=>daysSince(p.lastWatered)>=p.wateringInterval).length;let filtered=filter==='urgent'?plants.filter(p=>daysSince(p.lastWatered)>=p.wateringInterval||(daysSince(p.lastFertilized)??0)>=p.fertilizingInterval):plants;if(search.trim()){const q=search.trim().toLowerCase();filtered=filtered.filter(p=>p.name.toLowerCase().includes(q)||p.location.toLowerCase().includes(q));}const listHTML=filtered.length===0?`<div class="empty-state"><div class="emoji">🌱</div><h2>${search?'Sin resultados':filter==='urgent'?'¡Todo al día!':'Sin plantas aún'}</h2><p>${search?`No hay plantas con "${search}"`:filter==='urgent'?'Ninguna necesita atención':'Toca + para añadir tu primera planta'}</p></div>`:filtered.map(renderCard).join('');document.getElementById('app').innerHTML=`<div style="min-height:100vh;background:linear-gradient(160deg,#c8e6c0 0%,#e8f0e4 40%,#d4ebd0 100%);max-width:520px;margin:0 auto;padding-bottom:80px"><div class="header"><div class="header-top"><div><h1>Mis Plantas 🌿</h1><div class="header-sub">${plants.length} planta${plants.length!==1?'s':''}${urgentCount>0?` · <span class="urgent-text">${urgentCount} necesita${urgentCount!==1?'n':''} agua</span>`:''}</div></div><button class="add-btn" onclick="openAdd()">+</button></div><div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" type="text" placeholder="Buscar planta o ubicación…" value="${search}" oninput="setSearch(this.value)">${search?`<button class="search-clear" onclick="clearSearch()">✕</button>`:''}</div><div class="filter-tabs"><button class="filter-tab ${filter==='all'?'active':'inactive'}" onclick="setFilter('all')">Todas</button><button class="filter-tab ${filter==='urgent'?'active':'inactive'}" onclick="setFilter('urgent')">⚠️ Urgentes</button></div></div><div class="plant-grid">${listHTML}</div></div>${modal?`<div class="modal-overlay" onclick="handleOverlayClick(event)"><div class="modal-sheet" onclick="event.stopPropagation()">${modal.type==='detail'?renderDetail(modal.plant):renderForm(modal.plant)}</div></div>`:''}`;} render();
</script>
</body>
</html>
